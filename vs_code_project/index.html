<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock Market Admin Portal</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Stock Market Analytics</h1>
    <p class="subtitle">Real-time engagement insights from the mobile app</p>
  </header>

  <main>
    <section>
      <h2>Top Viewed Stocks</h2>
      <canvas id="stockClicksChart"></canvas>
    </section>

    <section>
      <h2>Most Visited Screens</h2>
      <canvas id="screenViewsChart"></canvas>
    </section>

    <section>
      <h2>Average Time per Screen</h2>
      <canvas id="durationChart"></canvas>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 StockAnalytics • All rights reserved</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
